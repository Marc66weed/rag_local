name: RAG Clean Pipeline

on:
  push:
    branches: [ main ]

jobs:
  # --- 第一階段：CI (純淨整合) ---
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13' # 確保與你目前的 Windows 環境一致

      - name: Install dependencies
        # 使用 -q (quiet) 減少日誌輸出，讓畫片更乾淨
        run: |
          python -m pip install --upgrade pip -q
          pip install -r requirements.txt -q

  # --- 第二階段：CD (靜默部署) ---
  deploy-to-windows:
    needs: build-test
    runs-on: self-hosted # 執行於你的 Windows 筆電
    steps:
      - name: Sync Code
        shell: powershell
        run: |
          git pull origin main -q

      - name: Memory & Service Refresh
        shell: powershell
        run: |
          # 解決之前遇到的 4.0GiB 記憶體限制問題
          Stop-Process -Name "python" -ErrorAction SilentlyContinue
          # 啟動 Streamlit 介面
          Start-Process -FilePath ".\venv\Scripts\streamlit.exe" -ArgumentList "run interface.py"