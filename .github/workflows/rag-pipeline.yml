name: RAG Clean Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip -q
          if [ -f requirements.txt ]; then pip install -r requirements.txt -q; fi

  deploy-to-windows:
    needs: build-test
    runs-on: self-hosted
    steps:
      - name: Terminate Existing Processes
        shell: powershell
        run: |
          Stop-Process -Name "python", "streamlit", "git" -Force -ErrorAction SilentlyContinue
          Start-Sleep -s 2

      - name: Native Git Sync
        shell: powershell
        run: |
          if (-not (Test-Path .git)) { git init }
          git remote remove origin -ErrorAction SilentlyContinue
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Marc66weed/rag_local.git
          git fetch origin main
          git reset --hard origin/main

      # 核心修正：讓 GitHub Runner 自動幫你把 Python 的 PATH 設定好
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # 自動建立環境與啟動
      - name: Setup Env and Launch Streamlit
        shell: powershell
        run: |
          # 1. 如果沒有 venv 資料夾，就當場建立一個
          if (-not (Test-Path ".\venv")) {
              python -m venv venv
          }
          
          # 2. 防呆：確認 requirements.txt 存在才安裝套件
          if (Test-Path "requirements.txt") {
              .\venv\Scripts\pip install -r requirements.txt -q
          }
          
          # 3. 啟動 Streamlit
          Start-Process -FilePath ".\venv\Scripts\streamlit.exe" -ArgumentList "run interface.py"