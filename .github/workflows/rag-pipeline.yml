name: RAG Clean Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip -q
          if [ -f requirements.txt ]; then pip install -r requirements.txt -q; fi

  deploy-to-windows:
    needs: build-test
    runs-on: self-hosted
    steps:
      # 1. 第一步先殺掉所有鎖定檔案的程序，出錯也繼續跑
      - name: Kill Locked Processes
        shell: powershell
        continue-on-error: true
        run: |
          taskkill /F /IM python.exe /T
          taskkill /F /IM streamlit.exe /T
          Start-Sleep -s 3

      # 2. 關鍵：設定 clean 為 false。這會防止它去動那個報錯的 _temp 資料夾
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          clean: false

      # 3. 啟動 Streamlit (確保路徑正確)
      - name: Launch Streamlit
        shell: powershell
        run: |
          Start-Process -FilePath ".\venv\Scripts\streamlit.exe" -ArgumentList "run interface.py"