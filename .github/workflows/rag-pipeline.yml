name: RAG Clean Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip -q
          if [ -f requirements.txt ]; then pip install -r requirements.txt -q; fi

  deploy-to-windows:
    needs: build-test
    runs-on: self-hosted
    steps:
      # 1. 使用標準 PowerShell 語法關閉進程，避免 || 錯誤
      - name: Terminate Existing Processes
        shell: powershell
        run: |
          $processes = Get-Process python -ErrorAction SilentlyContinue
          if ($processes) { $processes | Stop-Process -Force -ErrorAction SilentlyContinue }
          Start-Sleep -s 2

      # 2. 核心修正：停用 clean。避免 Windows 在 checkout 時嘗試刪除被鎖定的目錄
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          clean: false

      # 3. 核心修正：使用 cmd 徹底脫離進程樹，避免鎖住 _temp 資料夾
      - name: Launch Streamlit (Detached)
        shell: cmd
        run: |
          start /B venv\Scripts\streamlit.exe run interface.py