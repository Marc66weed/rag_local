name: RAG Clean Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip -q
          if [ -f requirements.txt ]; then pip install -r requirements.txt -q; fi

  deploy-to-windows:
    needs: build-test
    runs-on: self-hosted
    steps:
      # 1. 殺掉所有可能干擾的背景進程
      - name: Terminate Existing Processes
        shell: powershell
        run: |
          Stop-Process -Name "python", "streamlit", "git" -Force -ErrorAction SilentlyContinue
          Start-Sleep -s 2

      # 2. 拔掉官方 checkout 套件，改用原生 Git 指令強行同步 (完全避開 rmdir 錯誤)
      - name: Native Git Sync
        shell: powershell
        run: |
          # 確保有 Git 儲存庫環境
          if (-not (Test-Path .git)) {
            git init
          }
          # 移除舊連線並使用 GitHub 內建 Token 建立安全連線
          git remote remove origin -ErrorAction SilentlyContinue
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Marc66weed/rag_local.git
          
          # 強制抓取最新代碼並覆蓋本地
          git fetch origin main
          git reset --hard origin/main

      # 3. 啟動 Streamlit
      - name: Launch Streamlit
        shell: powershell
        run: |
          Start-Process -FilePath ".\venv\Scripts\streamlit.exe" -ArgumentList "run interface.py"