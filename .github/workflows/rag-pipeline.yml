name: RAG Clean Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip -q
          if [ -f requirements.txt ]; then pip install -r requirements.txt -q; fi

  deploy-to-windows:
    needs: build-test
    runs-on: self-hosted
    steps:
      # 1. 關鍵修正：先解鎖檔案，再進行同步
      - name: Unlock Files (Kill Python)
        shell: powershell
        run: |
          Stop-Process -Name "python" -Force -ErrorAction SilentlyContinue
          # 給系統 2 秒鐘反應時間釋放控制權
          Start-Sleep -s 2

      # 2. 同步程式碼 (加上 clean: false 避免 EBUSY 錯誤)
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          clean: false 

      # 3. 啟動服務
      - name: Launch Streamlit
        shell: powershell
        run: |
          # 確保路徑正確並在背景啟動
          Start-Process -FilePath ".\venv\Scripts\streamlit.exe" -ArgumentList "run interface.py"