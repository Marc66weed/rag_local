name: RAG Clean Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip -q
          if [ -f requirements.txt ]; then pip install -r requirements.txt -q; fi

  deploy-to-windows:
    needs: build-test
    runs-on: self-hosted
    steps:
      # 1. 徹底關閉 Python 避免檔案被鎖住，使用 continue-on-error 確保沒程式時也能繼續
      - name: Terminate Existing Processes
        shell: powershell
        continue-on-error: true
        run: |
          Get-Process python -ErrorAction SilentlyContinue | Stop-Process -Force
          Get-Process streamlit -ErrorAction SilentlyContinue | Stop-Process -Force
          Start-Sleep -s 2

      # 2. 同步程式碼，關閉 clean 功能避免 Windows 刪除暫存夾時報錯 (EBUSY)
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          clean: false

      # 3. 啟動 Streamlit
      - name: Launch Streamlit
        shell: powershell
        run: |
          Start-Process -FilePath ".\venv\Scripts\streamlit.exe" -ArgumentList "run interface.py"