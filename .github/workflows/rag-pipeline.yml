name: RAG Clean Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip -q
          if [ -f requirements.txt ]; then pip install -r requirements.txt -q; fi

  deploy-to-windows:
    needs: build-test
    runs-on: self-hosted
    steps:
      # 1. 清理舊進程：確保沒有 Python 或 Streamlit 在佔用檔案
      - name: Terminate Existing Processes
        shell: powershell
        run: |
          Get-Process python -ErrorAction SilentlyContinue | Stop-Process -Force
          Get-Process streamlit -ErrorAction SilentlyContinue | Stop-Process -Force

      # 2. 核心解法：關閉憑證駐留 (persist-credentials) 以避開 Windows 的 EBUSY 暫存目錄鎖死
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          clean: false
          persist-credentials: false 

      # 3. 啟動 Streamlit
      - name: Launch Streamlit
        shell: powershell
        run: |
          Start-Process -FilePath ".\venv\Scripts\streamlit.exe" -ArgumentList "run interface.py"