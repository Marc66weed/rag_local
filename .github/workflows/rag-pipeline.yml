name: RAG Clean Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip -q
          if [ -f requirements.txt ]; then pip install -r requirements.txt -q; fi

  deploy-to-windows:
    needs: build-test
    runs-on: self-hosted
    steps:
      # 1. 在同步程式碼之前，先確保沒有任何 Python 程序在佔用檔案
      - name: Force Unlock Files
        shell: powershell
        run: |
          # 使用 taskkill 比 Stop-Process 更徹底
          taskkill /F /IM python.exe /T /FI "STATUS eq RUNNING" || exit 0
          Start-Sleep -s 2

      # 2. 關鍵修正：停用自動清理功能，避免觸發 Windows 的 EBUSY 鎖定
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          clean: false 

      # 3. 啟動 RAG 介面
      - name: Launch Streamlit
        shell: powershell
        run: |
          # 確保使用虛擬環境並在背景開啟介面
          Start-Process -FilePath ".\venv\Scripts\streamlit.exe" -ArgumentList "run interface.py"